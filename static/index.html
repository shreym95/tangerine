<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>tangerine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ── Reset ────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:            #fff5ed;
  --bg-outer:      #ffeacc;
  --header-bg:     rgba(255, 245, 237, 0.92);
  --footer-bg:     rgba(255, 245, 237, 0.95);
  --bubble-user-a: #ffb347;
  --bubble-user-b: #ff8c00;
  --bubble-bot:    #ffffff;
  --border:        #ffcc99;
  --border-faint:  #ffe6cc;
  --send:          #ff8c00;
  --send-hover:    #e67e00;
  --send-off:      #ffd1b3;
  --text:          #2b1810;
  --text-2:        #593828;
  --muted:         #996b52;
  --scrollbar:     #ffcc99;
  --notice:        rgba(255, 140, 0, 0.1);
  --r:             18px;
  --r-sm:          5px;
}

/* ── Base ─────────────────────────────────────────────── */
html { height: 100%; }
body {
  height: 100%;
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  letter-spacing: -0.03em;
  background: var(--bg-outer);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#desktop-sidebar { display: none; }

/* ── App shell ────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: calc(100dvh - 40px);
  max-width: 440px;
  margin: 20px auto;
  border-radius: 36px;
  background: var(--bg);
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 8px #ffffff,
    0 12px 40px rgba(0,0,0,0.15),
    0 2px 10px rgba(0,0,0,0.08);
}

@media (max-width: 520px) {
  #app {
    height: 100dvh;
    max-width: 100%;
    margin: 0;
    border-radius: 0;
    box-shadow: none;
  }
}

/* ── Desktop Split Layout ──────────────────────────────── */
@media (min-width: 860px) {
  body {
    display: flex;
    align-items: stretch;
    padding: 24px;
    gap: 24px;
    box-sizing: border-box;
    height: 100dvh;
  }
  
  #desktop-sidebar {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 0 0 420px;
    background: var(--bg);
    border-radius: 20px;
    box-shadow: 0 0 0 4px #ffffff, 0 12px 40px rgba(0,0,0,0.15), 0 2px 10px rgba(0,0,0,0.08);
  }

  .sidebar-avatar-wrap {
    position: relative;
    cursor: pointer;
    border-radius: 50%;
  }

  .sidebar-avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    border: 8px solid #fff;
    box-shadow: 0 20px 40px rgba(255, 140, 0, 0.35);
    position: relative;
    z-index: 2;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .sidebar-avatar-wrap:hover .sidebar-avatar {
    transform: scale(1.08) translateY(-8px) rotate(4deg);
    box-shadow: 0 25px 45px rgba(255, 140, 0, 0.45);
  }
  .sidebar-avatar-wrap:active .sidebar-avatar {
    transform: scale(0.95) rotate(-2deg);
  }

  .sidebar-glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 160px; height: 160px;
    background: var(--send);
    filter: blur(45px);
    opacity: 0.4;
    transform: translate(-50%, -50%);
    z-index: 1;
    border-radius: 50%;
    animation: sidebarPulse 3s ease-in-out infinite alternate;
    transition: opacity 0.4s ease, filter 0.4s ease;
  }

  .sidebar-avatar-wrap:hover .sidebar-glow {
    opacity: 0.6;
    filter: blur(55px);
  }

  @keyframes sidebarPulse {
    from { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
    to { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
  }

  .sidebar-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-top: 40px;
    padding: 0 40px;
    animation: heroIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .sidebar-welcome h2 { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 10px; letter-spacing: -0.03em; }
  .sidebar-welcome h2 .highlight { color: var(--send); }
  .sidebar-welcome .hero-desc { font-size: 15.5px; font-weight: 500; color: var(--text-2); margin-bottom: 24px; line-height: 1.5; text-wrap: balance; }
  .sidebar-welcome .hero-sub { display: inline-block; font-size: 13.5px; color: var(--text-2); background: transparent; border: 1px solid var(--border); padding: 8px 16px; border-radius: 14px; line-height: 1.4; font-weight: 600; }

  #chat .welcome-hero {
    display: none;
  }

  #app {
    flex: 1;
    max-width: none;
    margin: 0;
    height: 100%;
    border-radius: 20px;
    box-shadow: 0 0 0 4px #ffffff, 0 12px 40px rgba(0,0,0,0.15), 0 2px 10px rgba(0,0,0,0.08);
  }
}

/* ── Header ───────────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 18px;
  padding-top: calc(11px + env(safe-area-inset-top, 0px));
  background: var(--header-bg);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-bottom: 1px solid var(--border-faint);
  flex-shrink: 0;
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 11px;
}

.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(232, 144, 106, 0.38);
  user-select: none;
  background-color: #fff;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.avatar:hover {
  transform: scale(1.15) rotate(-10deg);
  box-shadow: 0 6px 20px rgba(255, 140, 0, 0.5);
}

.header-info { display: flex; flex-direction: column; gap: 2px; }

.header-name {
  font-size: 15.5px;
  font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--text);
  line-height: 1;
}

.header-sub {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ff8c00;
  box-shadow: 0 0 0 1.5px rgba(255,140,0,0.25);
  flex-shrink: 0;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.model-tag {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  background: rgba(0,0,0,0.055);
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.01em;
  white-space: nowrap;
}

#clear-btn, #think-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 7px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  touch-action: manipulation;
  line-height: 0;
}
#clear-btn:hover { background: rgba(255,59,48,0.1); color: #ff3b30; transform: scale(1.15) rotate(15deg); }
#think-btn:hover { background: rgba(255,140,0,0.15); color: var(--send); transform: scale(1.15) translateY(-2px); }
#clear-btn:active { transform: scale(0.9) rotate(-10deg); }
#think-btn:active { transform: scale(0.9); }
#clear-btn svg, #think-btn svg { width: 15px; height: 15px; }
#think-btn.active { color: var(--send); background: rgba(255,140,0,0.12); }

/* ── Chat area ────────────────────────────────────────── */
#chat {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 14px 12px;
  display: flex;
  flex-direction: column;
  overscroll-behavior: contain;
}

#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

/* ── Welcome Hero ─────────────────────────────────────── */
.welcome-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin: auto 0;
  padding: 20px;
  animation: heroIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes heroIn {
  0% { opacity: 0; transform: scale(0.8) translateY(30px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.hero-avatar-wrap {
  position: relative;
  margin-bottom: 16px;
}
.hero-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 12px 30px rgba(255, 140, 0, 0.35);
  position: relative;
  z-index: 2;
  border: 4px solid #fff;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.hero-avatar:hover {
  transform: scale(1.1) rotate(5deg);
}
.hero-glow {
  position: absolute;
  top: 50%; left: 50%;
  width: 90px; height: 90px;
  background: var(--send);
  filter: blur(25px);
  opacity: 0.5;
  transform: translate(-50%, -50%);
  z-index: 1;
  border-radius: 50%;
  animation: pulseGlow 3s ease-in-out infinite alternate;
}
@keyframes pulseGlow {
  from { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
  to { transform: translate(-50%, -50%) scale(1.3); opacity: 0.6; }
}
.welcome-hero h2 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: -0.03em;
}
.welcome-hero h2 .highlight {
  color: var(--send);
}
.welcome-hero .hero-desc {
  font-size: 16.5px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.5;
  max-width: 360px;
}
.welcome-hero .hero-sub {
  display: inline-block;
  font-size: 14px;
  color: var(--send);
  background: rgba(255, 140, 0, 0.1);
  padding: 8px 18px;
  border-radius: 100px;
  line-height: 1.5;
  font-weight: 600;
}

/* ── Message rows ─────────────────────────────────────── */
@keyframes msgIn {
  0% { opacity: 0; transform: scale(0.8) translateY(20px) rotate(-3deg); }
  60% { opacity: 1; transform: scale(1.03) translateY(-3px) rotate(1deg); }
  100% { opacity: 1; transform: scale(1) translateY(0) rotate(0); }
}

.row {
  display: flex;
  flex-direction: column;
  margin-top: 2px;
  animation: msgIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.row.user { 
  align-items: flex-end; 
  transform-origin: bottom right; 
}
.row.assistant { 
  align-items: flex-start; 
  transform-origin: bottom left; 
}

/* Cross-sender gap */
.row.user + .row.assistant,
.row.assistant + .row.user { margin-top: 14px; }

/* ── Bubbles ──────────────────────────────────────────── */
.bubble {
  max-width: min(80%, 340px);
  padding: 12px 18px;
  border-radius: 30px;
  font-size: 15px;
  line-height: 1.4;
  word-wrap: break-word;
  white-space: pre-wrap;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.row.user .bubble:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 16px rgba(255, 140, 0, 0.25);
}
.row.assistant .bubble:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
}

/* User */
.row.user .bubble {
  background-color: var(--send);
  color: #fff;
  border-bottom-right-radius: 6px;
}
.row.user:has(+ .row.user) .bubble {
  border-bottom-right-radius: 30px;
}
.row.user + .row.user .bubble {
  border-top-right-radius: 12px;
}

/* Assistant */
.row.assistant .bubble {
  background-color: #ffd6b3;
  color: var(--text);
  border-bottom-left-radius: 6px;
  box-shadow: none;
}
.row.assistant:has(+ .row.assistant) .bubble {
  border-bottom-left-radius: 30px;
}
.row.assistant + .row.assistant .bubble {
  border-top-left-radius: 12px;
}

/* ── Timestamps ───────────────────────────────────────── */
.ts {
  font-size: 10px;
  color: var(--muted);
  opacity: 0.65;
  margin-top: 3px;
  padding: 0 5px;
  letter-spacing: 0.01em;
}

/* Hide timestamps for non-last messages in a group */
.row:not(:last-child).row.user + .row.user .ts,
.row.user:has(+ .row.user) .ts,
.row.assistant:has(+ .row.assistant) .ts {
  display: none;
}

/* ── Typing dots ──────────────────────────────────────── */
.typing-dots {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 1px;
}
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  opacity: 0.3;
  display: block;
  animation: tdot 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes tdot {
  0%, 60%, 100% { transform: translateY(0) scale(1); opacity: 0.3; background: var(--muted); }
  30%            { transform: translateY(-8px) scale(1.2); opacity: 1; background: var(--send); }
}

/* ── Trim notice ──────────────────────────────────────── */
.trim-notice {
  align-self: center;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--muted);
  background: var(--notice);
  border-radius: 20px;
  padding: 4px 14px;
  margin: 12px 0 4px;
  letter-spacing: 0.01em;
}

/* ── Input area ───────────────────────────────────────── */
#input-area {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  background: var(--footer-bg);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-top: 1px solid var(--border-faint);
  flex-shrink: 0;
}

.plus-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.06);
  color: #a8958a;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-bottom: 4px;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.plus-btn:hover { 
  background: rgba(255,140,0,0.15); 
  color: var(--send);
  transform: scale(1.15) rotate(180deg);
}
.plus-btn:active { transform: scale(0.85) rotate(90deg); }
.plus-btn svg { width: 18px; height: 18px; }

.input-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  align-items: flex-end;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
  transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.input-wrapper:focus-within { 
  border-color: var(--send); 
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(255,140,0,0.15);
}

#msg-input {
  flex: 1;
  min-height: 42px;
  max-height: 120px;
  padding: 10px 42px 10px 16px;
  border: none;
  border-radius: 22px;
  background: transparent;
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  outline: none;
  overflow-y: auto;
  line-height: 1.46;
}
#msg-input::placeholder { color: #ccaa99; }

#send-btn {
  position: absolute;
  right: 5px;
  bottom: 5px;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--send);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#send-btn:hover:not(:disabled) { 
  background: var(--send-hover); 
  transform: scale(1.15) translateY(-2px) rotate(-5deg);
  box-shadow: 0 6px 16px rgba(230,126,0,0.5);
}
#send-btn:active:not(:disabled) { 
  transform: scale(0.8) rotate(5deg); 
  box-shadow: 0 2px 5px rgba(230,126,0,0.3);
}
#send-btn:disabled { background: var(--send-off); cursor: not-allowed; }
#send-btn svg { width: 16px; height: 16px; margin-top: 1px; }

/* ── Markdown ─────────────────────────────────────────── */
.bubble.rendered { white-space: normal; }
.bubble p { margin-bottom: 5px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble pre {
  background: rgba(0,0,0,0.055);
  border-radius: 8px;
  padding: 9px 12px;
  overflow-x: auto;
  font-size: 12.5px;
  margin: 6px 0;
  white-space: pre;
}
.bubble code {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
  font-size: 12.5px;
  background: rgba(0,0,0,0.065);
  padding: 1px 5px;
  border-radius: 4px;
}
.bubble pre code { background: none; padding: 0; }
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; }
.bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
.bubble li { margin-bottom: 2px; }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 639px) {
  .bubble { max-width: 82%; }
  .model-tag { display: none; }
  #header { padding: 10px 14px; padding-top: calc(10px + env(safe-area-inset-top, 0px)); }
  #chat { padding: 14px 10px 10px; }
  #input-area { padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom, 8px)); gap: 8px; }
  #msg-input { font-size: 16px; } /* prevent iOS zoom on focus */
}
</style>
</head>
<body>

<div id="desktop-sidebar">
  <div class="sidebar-avatar-wrap">
    <div class="sidebar-glow"></div>
    <img src="avatar.png" class="sidebar-avatar" alt="tangerine">
  </div>
  <div class="sidebar-welcome">
    <h2>hey, i'm <span class="highlight">tangerine.</span> 👋</h2>
    <p class="hero-desc">your personal AI assistant built in-house by shrey.</p>
    <div class="hero-sub">🏠 everything runs locally, so your data is safe.</div>
  </div>
</div>

<div id="app">

  <div id="header">
    <div class="header-left">
      <img src="avatar.png" class="avatar" alt="tangerine avatar">
      <div class="header-info">
        <span class="header-name">tangerine</span>
        <span class="header-sub">
          <span class="status-dot"></span>
          ready
        </span>
      </div>
    </div>
    <div class="header-right">
      <span class="model-tag">gemma4:e4b</span>
      <button id="think-btn" title="Fast mode — click for deep thinking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </button>
      <button id="clear-btn" title="Clear conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <button class="plus-btn" title="Add attachment">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <div class="input-wrapper">
      <textarea id="msg-input" placeholder="Message" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>

</div>
<script>
const STORAGE_KEY = 'tangerine_v1';
let messages = [];   // [{role, content, time}]
let isStreaming = false;
let thinkMode = JSON.parse(localStorage.getItem('tangerine_think') || 'false');

const chatEl    = document.getElementById('chat');
const inputEl   = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');
const thinkBtn  = document.getElementById('think-btn');

// ── Persistence ──────────────────────────────────────────
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); }
function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) messages = JSON.parse(s); } catch {}
}

// ── Time ─────────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Markdown (post-stream only) ───────────────────────────
function renderMarkdown(raw) {
  // Protect code blocks first
  const blocks = [];
  let html = raw.replace(/```[\s\S]*?```/g, m => { blocks.push(m); return `\x00${blocks.length - 1}\x00`; });

  html = html
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');

  // Lists
  html = html.replace(/(^[-*] .+$(\n[-*] .+$)*)/gm, match => {
    const items = match.split('\n').map(l => `<li>${l.replace(/^[-*] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // Restore code blocks
  html = html.replace(/\x00(\d+)\x00/g, (_, i) => {
    const block = blocks[+i];
    const code = block.replace(/^```\w*\n?/, '').replace(/```$/, '').trim();
    return `<pre><code>${code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
  });

  // Paragraphs
  const parts = html.split(/\n\n+/);
  html = parts.map(p => {
    if (/^<(pre|ul|ol|li)/.test(p.trim())) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');

  return html;
}

// ── Batch splitting (paragraph-aware, respects code fences) ──
function splitIntoBatches(text) {
  const paragraphs = text.split(/\n\n+/);
  const batches = [];
  let current = '';
  let fenceOpen = false;

  for (const para of paragraphs) {
    const fences = (para.match(/```/g) || []).length;
    if (fenceOpen) {
      current += (current ? '\n\n' : '') + para;
      if (fences % 2 === 1) fenceOpen = false;
    } else if (fences % 2 === 1) {
      current += (current ? '\n\n' : '') + para;
      fenceOpen = true;
    } else {
      if (current.length >= 80) {
        batches.push(current);
        current = para;
      } else {
        current += (current ? '\n\n' : '') + para;
      }
    }
  }
  if (current) batches.push(current);
  return batches.length ? batches : [text];
}

// ── DOM helpers ───────────────────────────────────────────
function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

function renderWelcome() {
  const hero = document.createElement('div');
  hero.className = 'welcome-hero';
  hero.innerHTML = `
    <div class="hero-avatar-wrap">
      <img src="avatar.png" alt="tangerine" class="hero-avatar">
      <div class="hero-glow"></div>
    </div>
    <h2>hey, i'm <span class="highlight">tangerine.</span> 👋</h2>
    <p class="hero-desc">your personal AI assistant built in-house by shrey.</p>
    <div class="hero-sub">🏠 everything runs locally, so your data is safe.</div>
  `;
  chatEl.appendChild(hero);
}

function makeRow(role, text, time, streaming) {
  const row = document.createElement('div');
  row.className = `row ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (streaming ? ' streaming' : '');

  if (streaming) {
    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(dots);
  } else {
    bubble.textContent = text;
  }

  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = time;

  row.appendChild(bubble);
  row.appendChild(ts);
  return { row, bubble };
}

function addTrimNotice() {
  const el = document.createElement('div');
  el.className = 'trim-notice';
  el.textContent = 'older messages removed to fit context';
  chatEl.appendChild(el);
}

// ── Render all from messages[] ────────────────────────────
function renderAll() {
  chatEl.innerHTML = '';
  if (messages.length === 0) {
    renderWelcome();
    scrollBottom();
    return;
  }
  for (const m of messages) {
    if (m.role === 'assistant') {
      for (const batch of splitIntoBatches(m.content)) {
        const { row, bubble } = makeRow('assistant', '', m.time, false);
        bubble.innerHTML = renderMarkdown(batch);
        bubble.classList.add('rendered');
        chatEl.appendChild(row);
      }
    } else {
      const { row } = makeRow('user', m.content, m.time, false);
      chatEl.appendChild(row);
    }
  }
  scrollBottom();
}

// ── Send ──────────────────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  resize();

  const uTime = now();
  messages.push({ role: 'user', content: text, time: uTime });
  save();

  // Clear welcome bubbles on first real message
  if (messages.length === 1) chatEl.innerHTML = '';

  const { row: uRow } = makeRow('user', text, uTime, false);
  chatEl.appendChild(uRow);
  scrollBottom();

  const aTime = now();
  const { row: aRow, bubble: aBubble } = makeRow('assistant', '', aTime, true);
  chatEl.appendChild(aRow);
  scrollBottom();

  let fullText = '';    // full response — saved to messages[]
  let batchText = '';   // current bubble's accumulated text
  let inFence = false;  // inside a ``` code block?
  let activeBubble = aBubble;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        think: thinkMode
      })
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        try {
          const evt = JSON.parse(raw);
          if (evt.type === 'trimmed') {
            addTrimNotice();
          } else if (evt.type === 'content') {
            if (!fullText) {
              const dots = activeBubble.querySelector('.typing-dots');
              if (dots) dots.remove();
            }
            fullText += evt.text;
            batchText += evt.text;

            // Track code fence state
            if ((evt.text.match(/```/g) || []).length % 2 === 1) inFence = !inFence;

            // Paragraph split — only outside code fences
            if (!inFence) {
              const splitIdx = batchText.lastIndexOf('\n\n');
              if (splitIdx > 80) {
                const committed = batchText.slice(0, splitIdx).trim();
                batchText = batchText.slice(splitIdx + 2);
                activeBubble.classList.remove('streaming');
                activeBubble.classList.add('rendered');
                activeBubble.innerHTML = renderMarkdown(committed);
                const { row: nr, bubble: nb } = makeRow('assistant', '', aTime, false);
                chatEl.appendChild(nr);
                activeBubble = nb;
              }
            }

            activeBubble.textContent = batchText;
            scrollBottom();
          } else if (evt.type === 'done') {
            activeBubble.classList.remove('streaming');
            activeBubble.classList.add('rendered');
            activeBubble.innerHTML = renderMarkdown(batchText.trim());
            messages.push({ role: 'assistant', content: fullText, time: aTime });
            save();
            scrollBottom();
          }
        } catch {}
      }
    }
  } catch {
    activeBubble.classList.remove('streaming');
    activeBubble.textContent = 'connection error — is ollama running?';
    activeBubble.style.color = '#c0392b';
  }

  isStreaming = false;
  sendBtn.disabled = inputEl.value.trim() === '';
  inputEl.focus();
}

// ── Input resize ──────────────────────────────────────────
function resize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || isStreaming;
  resize();
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
});

sendBtn.addEventListener('click', send);

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!messages.length || !confirm('clear conversation?')) return;
  messages = [];
  save();
  renderAll();
});

// ── Think toggle ──────────────────────────────────────────
function updateThinkBtn() {
  thinkBtn.classList.toggle('active', thinkMode);
  thinkBtn.title = thinkMode
    ? 'Deep thinking on — click for fast mode'
    : 'Fast mode — click for deep thinking';
}

thinkBtn.addEventListener('click', () => {
  thinkMode = !thinkMode;
  localStorage.setItem('tangerine_think', JSON.stringify(thinkMode));
  updateThinkBtn();
});

// ── Init ──────────────────────────────────────────────────
load();
renderAll();
updateThinkBtn();
inputEl.focus();
</script>
</body>
</html>
